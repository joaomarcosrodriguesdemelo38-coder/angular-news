<div class="auth-page">
  <mat-card class="auth-card">
    <h1>Entrar</h1>
    <p class="subtitle">Acesse sua conta para personalizar suas notícias e salvar favoritos.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>E-mail</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
        <mat-error *ngIf="email.hasError('required')">O e-mail é obrigatório.</mat-error>
        <mat-error *ngIf="email.hasError('email')">Informe um e-mail válido.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" autocomplete="current-password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword" [attr.aria-label]="'Mostrar senha'">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="password.hasError('required')">A senha é obrigatória.</mat-error>
        <mat-error *ngIf="password.hasError('minlength')">A senha deve ter ao menos 6 caracteres.</mat-error>
      </mat-form-field>

      <p class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</p>

      <button mat-flat-button color="primary" type="submit" class="full-width submit-btn" [disabled]="loading">
        <mat-icon *ngIf="loading" inline="true" class="spin">autorenew</mat-icon>
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="switch-auth">
      Ainda não tem conta? <a routerLink="/auth/cadastro">Criar conta</a>
    </p>
  </mat-card>
</div>
